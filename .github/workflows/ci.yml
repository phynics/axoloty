name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  required-checks:
    name: Required Linux checks
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          persist-credentials: false

      # hashFiles() is only valid in step-level expressions, not
      # workflow/job-level `env:`, so compute the cache key and image
      # reference here and export them for later steps.
      - name: Compute cache key and image reference
        run: |
          echo "SWIFT_CACHE_KEY=swiftpm-6.3-linux-${{ hashFiles('Package.resolved', '.devcontainer/Dockerfile') }}" >> "$GITHUB_ENV"
          echo "DEV_IMAGE_REF=ghcr.io/${{ github.repository_owner }}/axoloty-dev:swift-6.3-${{ hashFiles('.devcontainer/Dockerfile') }}" >> "$GITHUB_ENV"

      - name: Setup container image
        uses: ./.github/actions/setup-container
        with:
          image-ref: ${{ env.DEV_IMAGE_REF }}

      - name: Restore SwiftPM dependency cache
        uses: actions/cache/restore@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: .swiftpm-cache
          key: ${{ env.SWIFT_CACHE_KEY }}
          restore-keys: |
            swiftpm-6.3-linux-

      - name: Prepare changed-line diff
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .testing/coverage
          git diff --unified=0 "$BASE_SHA" "$GITHUB_SHA" > .testing/coverage/changed.diff

      - name: Run consolidated checks
        env:
          COVERAGE_DIFF_BASE: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || '' }}
        run: make ci CONTAINER_RUNTIME=docker BUILD_DIR=.build COVERAGE_BUILD_DIR=.build BUILD_LOCK=0 SPM_CACHE_DIR=.swiftpm-cache

      - name: Save SwiftPM dependency cache
        if: success() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/cache/save@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: .swiftpm-cache
          key: ${{ env.SWIFT_CACHE_KEY }}

      - name: Upload coverage summary
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: coverage-summary-${{ github.run_id }}
          path: |
            .testing/coverage/report.json
            .testing/coverage/report.txt
          if-no-files-found: warn
          retention-days: 7

      - name: Upload coverage diagnostics
        if: failure() || github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: coverage-diagnostics-${{ github.run_id }}
          path: .testing/coverage/
          if-no-files-found: warn
          retention-days: 7
