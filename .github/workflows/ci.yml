name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  support-self-tests:
    name: Support harness self-tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run harness self-tests and tier validation
        run: make test-support

  wire-compatibility:
    name: Wire compatibility fixtures
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup container image
        uses: ./.github/actions/setup-container

      - name: Cache Swift build artifacts
        uses: actions/cache@v4
        with:
          path: .build
          key: build-${{ hashFiles('Package.resolved') }}-${{ hashFiles('Source/**/*.swift', 'Tests/**/*.swift') }}
          restore-keys: |
            build-${{ hashFiles('Package.resolved') }}-
            build-

      - name: Run wire compatibility gate
        run: make test-wire CONTAINER_RUNTIME=docker

  build-and-test:
    name: Linux build and test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # GitHub-hosted runners provide Docker, while local development normally
      # auto-detects Podman. Keep the Makefile as the shared entry point and
      # select Docker explicitly in CI.
      - name: Setup container image
        uses: ./.github/actions/setup-container

      - name: Cache Swift build artifacts
        uses: actions/cache@v4
        with:
          path: .build
          key: build-${{ hashFiles('Package.resolved') }}-${{ hashFiles('Source/**/*.swift', 'Tests/**/*.swift') }}
          restore-keys: |
            build-${{ hashFiles('Package.resolved') }}-
            build-

      - name: Build and test
        run: make build test CONTAINER_RUNTIME=docker

  coverage:
    name: Source coverage ratchet
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup container image
        uses: ./.github/actions/setup-container

      - name: Cache Swift build artifacts
        uses: actions/cache@v4
        with:
          path: .build
          key: build-${{ hashFiles('Package.resolved') }}-${{ hashFiles('Source/**/*.swift', 'Tests/**/*.swift') }}
          restore-keys: |
            build-${{ hashFiles('Package.resolved') }}-
            build-

      - name: Run coverage ratchet
        run: make coverage-check CONTAINER_RUNTIME=docker

      - name: Upload coverage report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: .testing/coverage/
          if-no-files-found: warn
