name: Docs

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

# Allow only one concurrent Pages deployment; cancel superseded runs.
concurrency:
  group: pages
  cancel-in-progress: true

env:
  SWIFT_CACHE_KEY: swiftpm-6.3-linux-${{ hashFiles('Package.resolved', '.devcontainer/Dockerfile') }}
  DEV_IMAGE_REF: ghcr.io/${{ github.repository_owner }}/axoloty-dev:swift-6.3-${{ hashFiles('.devcontainer/Dockerfile') }}

jobs:
  build-docs:
    name: Build DocC documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Setup container image
        uses: ./.github/actions/setup-container
        with:
          image-ref: ${{ env.DEV_IMAGE_REF }}

      - name: Restore SwiftPM dependency cache
        uses: actions/cache/restore@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: .swiftpm-cache
          key: ${{ env.SWIFT_CACHE_KEY }}
          restore-keys: |
            swiftpm-6.3-linux-

      - name: Generate documentation
        run: make docs CONTAINER_RUNTIME=docker BUILD_DIR=.build SPM_CACHE_DIR=.swiftpm-cache DOC_HOSTING_BASE_PATH=axoloty

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: .build/docc

  deploy:
    name: Deploy to GitHub Pages
    needs: build-docs
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
