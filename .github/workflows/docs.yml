name: Docs

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent Pages deployment; cancel superseded runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-docs:
    name: Build DocC documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup container image
        uses: ./.github/actions/setup-container

      - name: Cache Swift build artifacts
        uses: actions/cache@v4
        with:
          path: .build
          key: build-${{ hashFiles('Package.resolved') }}-${{ hashFiles('Source/**/*.swift', 'Tests/**/*.swift') }}
          restore-keys: |
            build-${{ hashFiles('Package.resolved') }}-
            build-

      - name: Generate documentation
        run: make docs CONTAINER_RUNTIME=docker

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .build/docc

  deploy:
    name: Deploy to GitHub Pages
    needs: build-docs
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
