name: Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

# Allow only one concurrent Pages deployment; cancel superseded runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-docs:
    name: Build DocC documentation
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: read
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      # hashFiles() is only valid in step-level expressions, not
      # workflow/job-level `env:`, so compute the cache key here and
      # export it for later steps.
      - name: Compute cache key
        run: |
          echo "SWIFT_CACHE_KEY=swiftpm-6.3-linux-${{ hashFiles('Package.resolved', '.devcontainer/Dockerfile') }}" >> "$GITHUB_ENV"

      - name: Setup container image
        uses: ./.github/actions/setup-container

      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5.0.0

      - name: Restore SwiftPM dependency cache
        uses: actions/cache/restore@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: .swiftpm-cache
          key: ${{ env.SWIFT_CACHE_KEY }}
          restore-keys: |
            swiftpm-6.3-linux-

      - name: Generate documentation
        run: make docs CONTAINER_RUNTIME=docker BUILD_DIR=.build BUILD_LOCK=0 SPM_CACHE_DIR=.swiftpm-cache DOC_HOSTING_BASE_PATH="${{ steps.pages.outputs.base_path }}"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: .build/docc

  deploy:
    name: Deploy to GitHub Pages
    needs: build-docs
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5

  smoke-check:
    name: Smoke check deployed docs
    needs: deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Install Playwright
        run: |
          cd .github/scripts
          npm install
          npx playwright install --with-deps chromium

      - name: Run smoke check
        run: |
          cd .github/scripts
          node docs-smoke-check.mjs "${{ needs.deploy.outputs.page_url }}"
