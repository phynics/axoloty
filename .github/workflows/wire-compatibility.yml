name: Wire Compatibility

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * 1"

jobs:
  live-coatyjs:
    name: Live CoatyJS compatibility
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      # hashFiles() is only valid in step-level expressions, not
      # workflow/job-level `env:`, so compute the cache key and image
      # reference here and export them for later steps.
      - name: Compute cache key and image reference
        run: |
          echo "SWIFT_CACHE_KEY=swiftpm-6.3-linux-${{ hashFiles('Package.resolved', '.devcontainer/Dockerfile') }}" >> "$GITHUB_ENV"
          echo "DEV_IMAGE_REF=ghcr.io/${{ github.repository_owner }}/axoloty-dev:swift-6.3-${{ hashFiles('.devcontainer/Dockerfile') }}" >> "$GITHUB_ENV"

      - name: Setup container image
        uses: ./.github/actions/setup-container
        with:
          image-ref: ${{ env.DEV_IMAGE_REF }}

      - name: Restore SwiftPM dependency cache
        uses: actions/cache/restore@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: .swiftpm-cache
          key: ${{ env.SWIFT_CACHE_KEY }}
          restore-keys: |
            swiftpm-6.3-linux-

      - name: Run offline and live wire suites
        run: make test-wire-all CONTAINER_RUNTIME=docker BUILD_DIR=.build BUILD_LOCK=0 SPM_CACHE_DIR=.swiftpm-cache

      - name: Upload wire captures on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: wire-captures
          path: |
            .testing/wire/
          if-no-files-found: ignore
