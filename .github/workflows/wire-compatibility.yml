name: Wire Compatibility

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * 1"

jobs:
  live-coatyjs:
    name: Live CoatyJS compatibility
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup container image
        uses: ./.github/actions/setup-container

      - name: Cache Swift build artifacts
        uses: actions/cache@v4
        with:
          path: .build
          key: swift-6.3-linux-build-${{ hashFiles('Package.resolved') }}-${{ hashFiles('Source/**/*.swift', 'Tests/**/*.swift', '.devcontainer/Dockerfile') }}
          restore-keys: |
            swift-6.3-linux-build-${{ hashFiles('Package.resolved') }}-
            swift-6.3-linux-build-

      - name: Run offline and live wire suites
        run: make test-wire-all CONTAINER_RUNTIME=docker BUILD_DIR=.build

      - name: Upload wire captures on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: wire-captures
          path: |
            .testing/wire/
          if-no-files-found: ignore
