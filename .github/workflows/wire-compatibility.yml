name: Wire Compatibility

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * 1"

jobs:
  live-coatyjs:
    name: Live CoatyJS compatibility
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      # hashFiles() is only valid in step-level expressions, not
      # workflow/job-level `env:`, so compute the cache key here and
      # export it for later steps.
      - name: Compute cache key
        run: |
          echo "SWIFT_CACHE_KEY=swiftpm-6.3-linux-${{ hashFiles('Package.resolved', '.devcontainer/Dockerfile') }}" >> "$GITHUB_ENV"

      - name: Setup container image
        uses: ./.github/actions/setup-container

      - name: Restore SwiftPM dependency cache
        uses: actions/cache/restore@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: .swiftpm-cache
          key: ${{ env.SWIFT_CACHE_KEY }}
          restore-keys: |
            swiftpm-6.3-linux-

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: Tests/WireCompatibility/tool/package-lock.json

      - name: Build and test wire CLI
        run: make wire-tool

      - name: Run offline and live wire suites
        run: make test-wire-all CONTAINER_RUNTIME=docker BUILD_DIR=.build BUILD_LOCK=0 SPM_CACHE_DIR=.swiftpm-cache

      - name: Upload wire captures on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: wire-captures
          path: |
            .testing/wire/
          if-no-files-found: ignore
