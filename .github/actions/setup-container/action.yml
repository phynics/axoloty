name: Setup container image
description: Pull the pinned development image or build the local Dockerfile fallback.

inputs:
  runtime:
    description: Container runtime to use (docker or podman).
    required: false
    default: docker
  image-ref:
    description: Optional immutable registry image reference.
    required: false
    default: ""
  allow-build-fallback:
    description: Build the repository Dockerfile when the registry image is not published yet.
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - name: Pull development image
      if: inputs.image-ref != ''
      shell: bash
      run: |
        set -euo pipefail
        if "${{ inputs.runtime }}" pull "${{ inputs.image-ref }}"; then
          "${{ inputs.runtime }}" tag "${{ inputs.image-ref }}" coatyswift-dev
        elif [[ "${{ inputs.allow-build-fallback }}" == "true" ]]; then
          echo "Registry image unavailable; building the Dockerfile bootstrap fallback." >&2
          make image CONTAINER_RUNTIME=${{ inputs.runtime }}
        else
          echo "Pinned registry image unavailable and fallback is disabled." >&2
          exit 1
        fi

    - name: Build local development image
      if: inputs.image-ref == ''
      shell: bash
      run: make image CONTAINER_RUNTIME=${{ inputs.runtime }}
